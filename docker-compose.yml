services:
  app:
    build: .
    ports:
      - 8080:8080
    command: ./mvnw spring-boot:run
    depends_on:
      - db
    volumes:
      - .:/app
  db:
    image: postgres:16.3
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db-data:/var/lib/postgresql/data